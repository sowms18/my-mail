<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f5f5f5; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        .container { position: relative; width: 360px; height: 580px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); border-radius: 4px; overflow: hidden; background-color: #ffffff; border: 1px solid #eeeeee; }
        .reveal-content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; z-index: 1; }
        .watch-image { width: 100%; max-width: 300px; height: auto; margin-bottom: 25px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.08)); }
        .text-box { text-align: center; color: #1a1a1a; margin-bottom: 25px; }
        .text-box h2 { margin: 0; font-weight: 300; letter-spacing: 3px; text-transform: uppercase; font-size: 1.1rem; }
        .btn-select { position: relative; z-index: 999; padding: 16px 45px; background-color: #000; color: #fff; text-decoration: none; font-weight: 500; border-radius: 0; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; display: inline-block; cursor: pointer; }
        #scratch-layer { position: absolute; top: 0; left: 0; cursor: crosshair; touch-action: none; z-index: 10; }
    </style>
</head>
<body>
<div class="container">
    <div class="reveal-content">
        <img src="image_0.jpg" alt="Longines" class="watch-image">
        <div class="text-box">
            <h2>Beyond time</h2>
        </div>
        <a href="https://www.longines.com/en-us/p/watch-hydroconquest-l3-841-4-96-6" target="_blank" class="btn-select">SELECT SIZE</a>
    </div>
    <canvas id="scratch-layer" width="360" height="580"></canvas>
</div>
<script>
    const canvas = document.getElementById('scratch-layer');
    const ctx = canvas.getContext('2d');
    let isActive = false;
    function setup() {
        ctx.fillStyle = '#D3D3D3'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#BDBDBD';
        for (let i = 0; i < canvas.width; i += 3) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
        }
        ctx.fillStyle = '#777';
        ctx.font = '12px Helvetica';
        ctx.textAlign = 'center';
        ctx.fillText('SCRATCH TO REVEAL', 180, 290);
    }
    function handleScratch(e) {
        if (!isActive) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
        const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(x, y, 40, 0, Math.PI * 2);
        ctx.fill();
        checkProgress();
    }
    function checkProgress() {
        const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        let clear = 0;
        for (let i = 3; i < data.length; i += 1000) { if (data[i] === 0) clear++; }
        if (clear / ((canvas.width * canvas.height) / 1000) > 8) {
            canvas.style.pointerEvents = 'none'; 
            canvas.style.opacity = '0.3'; 
        }
    }
    canvas.addEventListener('mousedown', () => isActive = true);
    window.addEventListener('mouseup', () => isActive = false);
    canvas.addEventListener('mousemove', handleScratch);
    canvas.addEventListener('touchstart', (e) => { isActive = true; handleScratch(e); });
    canvas.addEventListener('touchend', () => isActive = false);
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleScratch(e); }, { passive: false });
    setup();
</script>
</body>
</html>

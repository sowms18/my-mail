<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f5f5f5; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        
        .container { 
            position: relative; width: 360px; height: 580px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.1); border-radius: 4px; 
            overflow: hidden; background-color: #ffffff; 
            border: 1px solid #eeeeee; 
        }
        
        .reveal-content { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; padding: 20px; box-sizing: border-box; 
            z-index: 1;
        }

        .watch-image { 
            width: 100%; max-width: 300px; height: auto; 
            margin-bottom: 25px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.08));
        }
        
        .text-box { text-align: center; color: #1a1a1a; margin-bottom: 25px; }
        .text-box h2 { margin: 0; font-weight: 300; letter-spacing: 3px; text-transform: uppercase; font-size: 1.1rem; }

        /* THE BUTTON */
        .btn-select { 
            position: relative;
            z-index: 999; 
            padding: 16px 45px; background-color: #000; color: #fff; 
            text-decoration: none; font-weight: 500; border-radius: 0; 
            text-transform: uppercase; font-size: 11px; letter-spacing: 2px;
            display: inline-block;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .btn-active {
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
            background-color: #1a1a1a;
        }

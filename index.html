<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Gift</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f5f5f5; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        
        .container { 
            position: relative; width: 360px; height: 550px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.1); border-radius: 4px; 
            overflow: hidden; background-color: #ffffff; 
            border: 1px solid #eeeeee; 
        }
        
        /* The Secret Content (Hidden initially) */
        .hidden-reveal { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; padding: 20px; box-sizing: border-box; 
            opacity: 0; /* Fully invisible at start */
            transition: opacity 0.8s ease-in; 
        }

        .watch-image { 
            width: 100%; max-width: 300px; height: auto; 
            margin-bottom: 25px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.08));
        }
        
        .text-box { text-align: center; color: #1a1a1a; margin-bottom: 25px; }
        .text-box h2 { margin: 0; font-weight: 300; letter-spacing: 3px; text-transform: uppercase; font-size: 1.1rem; }
        .text-box p { color: #999; font-size: 0.85rem; margin-top: 8px; letter-spacing: 1px; }

        /* Minimalist Steel Button */
        .btn-select { 
            padding: 16px 45px; background-color: #000; color: #fff; 
            text-decoration: none; font-weight: 500; border-radius: 0; 
            text-transform: uppercase; font-size: 11px; letter-spacing: 2px;
            pointer-events: none; /* Disabled until scratched */
            transition: all 0.3s;
        }

        /* The Silver Foil Layer */
        #scratch-layer { position: absolute; top: 0; left: 0; cursor: crosshair; touch-action: none; z-index: 10; }
    </style>
</head>

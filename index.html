<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f0f0; font-family: 'Helvetica Neue', Arial, sans-serif; }
        
        .container { 
            position: relative; width: 360px; height: 580px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.15); border-radius: 8px; 
            overflow: hidden; background-color: #ffffff; 
        }
        
        .reveal-content { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 20px; box-sizing: border-box; 
            z-index: 10; opacity: 0; transition: opacity 0.6s ease;
            pointer-events: none; 
        }
        
        .watch-image { width: 100%; max-width: 280px; height: auto; margin-bottom: 25px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1)); }
        .text-box { text-align: center; color: #1a1a1a; margin-bottom: 25px; }
        .text-box h2 { margin: 0; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; font-size: 1.1rem; }
        
        .btn-select { 
            padding: 16px 45px; background-color: #000; color: #fff; 
            text-decoration: none; font-weight: bold; text-transform: uppercase; 
            font-size: 11px; letter-spacing: 2px; display: inline-block; cursor: pointer;
            border: 1px solid #333;
        }

        #scratch-layer { 
            position: absolute; top: 0; left: 0; cursor: crosshair; 
            touch-action: none; z-index: 20; 
            /* Subtle CSS shine effect on the canvas element itself */
            background: linear-gradient(135deg, #cfd8dc 0%, #eceff1 50%, #b0bec5 100%);
        }
    </style>
</head>
<body>
<div class="container">
    <div id="main-content" class="reveal-content">
        <img src="image_0.jpg" alt="Longines" class="watch-image">
        <div class="text-box"><h2>To Moments Beyond Time</h2></div>
        <a href="https://www.longines.com/en-us/p/watch-hydroconquest-l3-841-4-96-6" target="_blank" class="btn-select">SELECT SIZE</a>
    </div>
    <canvas id="scratch-layer" width="360" height="580"></canvas>
</div>

<script>
    const canvas = document.getElementById('scratch-layer');
    const ctx = canvas.getContext('2d');
    const content = document.getElementById('main-content');
    let isActive = false;
    let revealed = false;

    function init() {
        // Create a Shining Silver Gradient
        const grad = ctx.createLinearGradient(0, 0, 360, 580);
        grad.addColorStop(0, '#ADB5BD');   // Darker silver
        grad.addColorStop(0.3, '#E9ECEF'); // Highlight shine
        grad.addColorStop(0.5, '#DEE2E6'); // Mid silver
        grad.addColorStop(0.7, '#F8F9FA'); // Bright highlight
        grad.addColorStop(1, '#6C757D');   // Depth shadow
        
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 360, 580);

        // Add "Brushed Metal" texture lines
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 1;
        for (let i = 0; i < 600; i += 4) {
            ctx.beginPath();
            ctx.moveTo(0, i);
            ctx.lineTo(360, i - 100);
            ctx.stroke();
        }

        ctx.fillStyle = '#495057';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('SCRATCH TO REVEAL', 180, 290);
    }

    function scratch(e) {
        if (!isActive) return;

        if (!revealed) {
            content.style.opacity = '1';
            content.style.pointerEvents = 'auto';
            canvas.style.zIndex = '5'; // Push canvas behind for clickability
            revealed = true;
        }

        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
        const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
        
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(x, y, 45, 0, Math.PI * 2);
        ctx.fill();
    }

    canvas.addEventListener('mousedown', () => isActive = true);
    window.addEventListener('mouseup', () => isActive = false);
    canvas.addEventListener('mousemove', scratch);
    canvas.addEventListener('touchstart', (e) => { isActive = true; scratch(e); });
    canvas.addEventListener('touchend', () => isActive = false);
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); }, { passive: false });

    init();
</script>
</body>
</html>

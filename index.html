<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Surprise for You!</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            position: relative;
            width: 350px;
            height: 200px;
            user-select: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-radius: 12px;
            overflow: hidden;
            border: 4px solid #D4AF37; /* Gold Border */
        }

        /* The "Gift Box" Underneath (Blue & Gold) */
        .gift-card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #002366; /* Royal Blue */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .gift-card h2 {
            color: #D4AF37; /* Gold Text */
            margin: 0;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .gift-card .code {
            font-size: 2rem;
            font-weight: bold;
            color: #FFFFFF;
            letter-spacing: 2px;
            margin-top: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        /* The Opaque Scratch Layer (Silver) */
        #scratch {
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
            touch-action: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="gift-card">
        <h2>Your Digital Gift</h2>
        <div class="code">GOLD-777-WIN</div>
    </div>
    <canvas id="scratch" width="350" height="200"></canvas>
</div>

<script>
    const canvas = document.getElementById('scratch');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;

    // 1. Create the Opaque Silver Foil
    function init() {
        // Fill with solid Silver
        ctx.fillStyle = '#C0C0C0'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Add a "Brushed Metal" texture effect
        ctx.strokeStyle = '#A0A0A0';
        for (let i = 0; i < canvas.width; i += 4) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i, canvas.height);
            ctx.stroke();
        }

        // Add "Scratch Here" instruction
        ctx.fillStyle = '#666';
        ctx.font = 'bold 18px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('SCRATCH TO REVEAL', 175, 105);
    }

    // 2. Scratch Logic
    function scratch(e) {
        if (!isDrawing) return;
        
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || e.touches[0].clientX) - rect.left;
        const y = (e.clientY || e.touches[0].clientY) - rect.top;

        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(x, y, 20, 0, Math.PI * 2);
        ctx.fill();
    }

    canvas.addEventListener('mousedown', () => isDrawing = true);
    canvas.addEventListener('mouseup', () => isDrawing = false);
    canvas.addEventListener('mousemove', scratch);
    
    // Mobile Support
    canvas.addEventListener('touchstart', () => isDrawing = true);
    canvas.addEventListener('touchend', () => isDrawing = false);
    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        scratch(e);
    }, { passive: false });

    init();
</script>

</body>
</html>

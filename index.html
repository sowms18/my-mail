<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f5f5f5; font-family: Arial, sans-serif; }
        .container { position: relative; width: 360px; height: 580px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); border-radius: 4px; overflow: hidden; background-color: #ffffff; }
        
        /* Content is invisible until scratching starts */
        .reveal-content { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; /* Physical removal from view */
            flex-direction: column; align-items: center; justify-content: center; 
            padding: 20px; box-sizing: border-box; z-index: 1; 
        }
        
        .watch-image { width: 100%; max-width: 280px; height: auto; margin-bottom: 25px; }
        .text-box { text-align: center; color: #1a1a1a; margin-bottom: 25px; }
        .text-box h2 { margin: 0; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; font-size: 1.1rem; }
        
        .btn-select { 
            padding: 16px 45px; background-color: #000; color: #fff; 
            text-decoration: none; font-weight: bold; text-transform: uppercase; 
            font-size: 11px; letter-spacing: 2px; display: inline-block; 
            position: relative; z-index: 999; 
        }

        #scratch-layer { position: absolute; top: 0; left: 0; cursor: crosshair; touch-action: none; z-index: 10; }
    </style>
</head>
<body>
<div class="container">
    <div id="main-content" class="reveal-content">
        <img src="image_0.jpg" alt="Longines" class="watch-image">
        <div class="text-box"><h2>To Moments Beyond Time</h2></div>
        <a href="https://www.longines.com/en-us/p/watch-hydroconquest-l3-841-4-96-6" target="_blank" class="btn-select">SELECT SIZE</a>
    </div>
    <canvas id="scratch-layer" width="360" height="580"></canvas>
</div>

<script>
    const canvas = document.getElementById('scratch-layer');
    const ctx = canvas.getContext('2d');
    const content = document.getElementById('main-content');
    let isActive = false;
    let revealed = false;

    // 1. Fill canvas with solid silver immediately
    ctx.fillStyle = '#C0C0C0';
    ctx.fillRect(0, 0, 360, 580);
    
    // 2. Add text instructions on the silver
    ctx.fillStyle = '#666';
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('SCRATCH TO REVEAL', 180, 290);

    function scratch(e) {
        if (!isActive) return;

        // 3. The moment they scratch, the watch/button pop into existence underneath
        if (!revealed) {
            content.style.display = 'flex';
            revealed = true;
        }

        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
        const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
        
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(x, y, 45, 0, Math.PI * 2);
        ctx.fill();

        // 4. If they scratch enough, kill the canvas so it doesn't block the link
        checkProgress();
    }

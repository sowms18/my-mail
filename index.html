<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise</title>
    <style>
        /* Force Version 2.1 - To Moments Beyond Time */
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f5f5f5; font-family: Arial, sans-serif; }
        .container { position: relative; width: 360px; height: 580px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); border-radius: 4px; overflow: hidden; background-color: #ffffff; }
        
        .reveal-content { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 20px; box-sizing: border-box; 
            z-index: 1; 
            opacity: 0; /* HIDDEN INITIALLY */
            transition: opacity 0.5s ease;
        }
        
        .watch-image { width: 100%; max-width: 280px; height: auto; margin-bottom: 25px; }
        .text-box { text-align: center; color: #1a1a1a; margin-bottom: 25px; }
        .text-box h2 { margin: 0; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; font-size: 1.1rem; }
        
        .btn-select { 
            padding: 16px 45px; background-color: #000; color: #fff; 
            text-decoration: none; font-weight: bold; text-transform: uppercase; 
            font-size: 11px; letter-spacing: 2px; display: inline-block; 
            position: relative; z-index: 999; 
            pointer-events: none; /* CANNOT CLICK UNTIL SCRATCHED */
        }

        #scratch-layer { position: absolute; top: 0; left: 0; cursor: crosshair; touch-action: none; z-index: 10; }
    </style>
</head>
<body>
<div class="container">
    <div id="main-content" class="reveal-content">
        <img src="image_0.jpg" alt="Longines" class="watch-image">
        <div id="text-header" class="text-box"><h2>To Moments Beyond Time</h2></div>
        <a id="link-btn" href="https://www.longines.com/en-us/p/watch-hydroconquest-l3-841-4-96-6" target="_blank" class="btn-select">SELECT SIZE</a>
    </div>
    <canvas id="scratch-layer" width="360" height="580"></canvas>
</div>

<script>
    const canvas = document.getElementById('scratch-layer');
    const ctx = canvas.getContext('2d');
    const content = document.getElementById('main-content');
    const btn = document.getElementById('link-btn');
    let isActive = false;
    let revealed = false;

    // Fill canvas with solid silver
    ctx.fillStyle = '#C0C0C0';
    ctx.fillRect(0, 0, 360, 580);
    
    ctx.fillStyle = '#666';
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('SCRATCH TO REVEAL', 180, 290);

    function scratch(e) {
        if (!isActive) return;

        // Reveal the content ONLY when scratching starts
        if (!revealed) {
            content.style.opacity = '1';
            btn.style.pointerEvents = 'auto'; // Enable the link
            revealed = true;
        }

        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
        const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
        
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(x, y, 45, 0, Math.PI * 2);
        ctx.fill();

        // Check if enough is scratched to let clicks through the canvas
        checkProgress();
    }

    function checkProgress() {
        const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        let clear = 0;
        for (let i = 3; i < data.length; i += 2000) { if (data[i] === 0) clear++; }
        if (clear / ((canvas.width * canvas.height) / 2000) > 10) {
            canvas.style.pointerEvents = 'none'; 
        }
    }

    canvas.addEventListener('mousedown', () => isActive = true);
    window.addEventListener('mouseup', () => isActive = false);
    canvas.addEventListener('mousemove', scratch);
    canvas.addEventListener('touchstart', (e) => { isActive = true; scratch(e); });
    canvas.addEventListener('touchend', () => isActive = false);
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); }, { passive: false });
</script>
</body>
</html>
